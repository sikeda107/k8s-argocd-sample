apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-gateway
  namespace: web-gateway
spec:
  parentRefs:
    - name: nginx-gateway
  hostnames:
    - nginx-gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx-gateway
          port: 80
