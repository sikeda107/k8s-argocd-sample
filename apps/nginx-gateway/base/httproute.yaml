apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-gateway
  namespace: web-gateway
spec:
  parentRefs:
    # 同 namespace の Gateway/nginx-gateway を参照
    - name: nginx-gateway
  hostnames:
    - nginx-gateway.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # 同 namespace の Service/nginx-gateway:80 を参照
        - name: nginx-gateway
          port: 80
