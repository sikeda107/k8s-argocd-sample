apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: web-gateway
  labels:
    app.kubernetes.io/name: nginx-gateway
    app.kubernetes.io/part-of: web-platform
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    # Deployment が管理対象にする Pod を labels で参照
    matchLabels:
      app.kubernetes.io/name: nginx-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-gateway
        app.kubernetes.io/part-of: web-platform
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              # named port "http" を同コンテナ内 ports.name から参照
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              # named port "http" を同コンテナ内 ports.name から参照
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
